apiVersion: v1
kind: Secret
metadata:
  name: {{ include "invoiceninja.fullname" . }}
  labels:
    {{- include "invoiceninja.labels" . | nindent 4 }}
type: Opaque
stringData:
  APP_KEY: {{ .Values.secret.APP_KEY | quote }}
  DB_PASSWORD: {{ .Values.secret.DB_PASSWORD | quote }}
  MYSQL_ROOT_PASSWORD: {{ .Values.secret.MYSQL_ROOT_PASSWORD | quote }}
