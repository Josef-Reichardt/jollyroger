# ── nginx / App (HTTP-Endpunkt) ───────────────────────────────
apiVersion: v1
kind: Service
metadata:
  name: {{ include "invoiceninja.fullname" . }}
  labels:
    {{- include "invoiceninja.labels" . | nindent 4 }}
    app.kubernetes.io/component: app
spec:
  type: {{ .Values.nginx.service.type }}
  selector:
    {{- include "invoiceninja.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: app
  ports:
    - name: http
      port: {{ .Values.nginx.service.port }}
      targetPort: http
      protocol: TCP
---
# ── MySQL – Headless Service für StatefulSet ─────────────────
# DNS: <release>-mysql-0.<release>-mysql.<namespace>.svc.cluster.local
{{- if .Values.mysql.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "invoiceninja.fullname" . }}-mysql
  labels:
    {{- include "invoiceninja.labels" . | nindent 4 }}
    app.kubernetes.io/component: mysql
spec:
  type: ClusterIP
  clusterIP: None
  selector:
    {{- include "invoiceninja.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: mysql
  ports:
    - name: mysql
      port: 3306
      targetPort: mysql
      protocol: TCP
{{- end }}
---
# ── Redis – Headless Service für StatefulSet ─────────────────
# DNS: <release>-redis-0.<release>-redis.<namespace>.svc.cluster.local
{{- if .Values.redis.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "invoiceninja.fullname" . }}-redis
  labels:
    {{- include "invoiceninja.labels" . | nindent 4 }}
    app.kubernetes.io/component: redis
spec:
  type: ClusterIP
  clusterIP: None
  selector:
    {{- include "invoiceninja.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: redis
  ports:
    - name: redis
      port: 6379
      targetPort: redis
      protocol: TCP
{{- end }}
